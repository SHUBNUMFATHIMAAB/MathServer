<html>
<head>
    <title>GST Bill Calculator</title>
<style>
    body {
        background-color: lightblue;
        margin: 0;
        padding: 20px;
    }

    .box {
        background-color: white;
        padding: 25px;
        width: 300px;
        border-radius: 10px;
        text-align: center;
        border: 2px solid darkblue;
        margin: 50px auto;
    }

    h2 {
        color: darkblue;
        margin-bottom: 5px;
    }

    .student-info {
        font-size: 14px;
        margin-bottom: 15px;
        border-bottom: 1px solid gray;
        padding-bottom: 8px;
    }

    .formelt {
        margin: 8px;
    }

    input[type="text"] {
        padding: 5px;
        width: 80%;
        border: 1px solid gray;
    }

    input[type="submit"] {
        background-color: green;
        color: white;
        border: 1px solid black;
        padding: 6px;
        width: 85%;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="box">

    <!-- Added Name and Register Number -->
    <div class="student-info">
        <strong>Shubnum Fathima A B</strong><br>
        Ref No: 25010692
    </div>

    <h2>GST Bill Calculator</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="formelt">
            Price (₹):<br>
            <input type="text" name="price" value="{{ price }}">
        </div>

        <div class="formelt">
            GST (%):<br>
            <input type="text" name="gst" value="{{ gst }}">
        </div>

        <div class="formelt">
            <input type="submit" value="Calculate">
        </div>

        <div class="formelt">
            Total Bill:<br>
            <input type="text" value="{{ total }}" readonly>
        </div>

    </form>
</div>

</body>
</html>
